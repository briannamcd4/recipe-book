<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McDonald Sisters' Recipe Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header>
    <div class="logo">mcdonald sisters' <span>recipe book</span></div>
    <div class="header-actions">
      <button id="add-recipe-btn" onclick="openAddModal()" style="display:none">+ Add Recipe</button>
      <button id="login-btn" onclick="openLoginModal()" class="btn-ghost">Sign In</button>
      <div id="user-menu" style="display:none">
        <span id="user-email-display"></span>
        <button onclick="handleSignOut()" class="btn-ghost">Sign Out</button>
      </div>
    </div>
  </header>

  <div id="filter-bar">
    <span class="filter-label">Browse:</span>
    <button class="cat-btn active" onclick="filterCat('all', this)">All</button>
  </div>

  <div id="home-page">
    <main id="recipes-main">
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="big">&#127859;</div>
        <p>Your recipe book is empty — add your first recipe!</p>
      </div>
      <div class="loading-state" id="loading-state">
        <div class="big">&#8987;</div>
        <p>Loading recipes...</p>
      </div>
      <div id="categories-container"></div>
    </main>
  </div>

  <div id="detail-page"></div>

  <!-- LOGIN MODAL -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal" style="max-width:400px">
      <button class="modal-close" onclick="closeLoginModal()">&#x2715;</button>
      <div class="modal-title">Sign In</div>
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" />
      <div id="login-status" class="url-status"></div>
      <button class="btn-primary" onclick="handlePasswordLogin()">Sign In</button>
    </div>
  </div>

  <!-- ADD RECIPE MODAL -->
  <div class="modal-overlay" id="add-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      <div class="modal-title">Add a Recipe</div>
      <div class="form-tabs">
        <button class="form-tab active" id="tab-manual" onclick="switchTab('manual')">Write it myself</button>
        <button class="form-tab" id="tab-url" onclick="switchTab('url')">Paste a link</button>
      </div>
      <div id="url-tab-content" style="display:none">
        <label>Recipe URL</label>
        <input type="url" id="recipe-url" placeholder="https://www.allrecipes.com/recipe/..." />
        <div class="url-status" id="url-status"></div>
        <label>Category</label>
        <select id="url-category">
          <option value="">— choose a category —</option>
          <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
          <option>Desserts</option><option>Snacks</option><option>Drinks</option>
          <option>Soups &amp; Stews</option><option>Salads</option><option>Baked Goods</option><option>Other</option>
        </select>
        <label>Notes (tips, substitutions, memories...)</label>
        <textarea id="url-notes" placeholder="My thoughts on this recipe&#10;What I changed&#10;How it turned out..."></textarea>
        <button class="btn-primary" onclick="fetchAndSave()">Fetch &amp; Save Recipe</button>
      </div>
      <div id="manual-tab-content">
        <div class="form-row">
          <div>
            <label>Recipe name</label>
            <input type="text" id="m-title" placeholder="Grandma's Apple Pie" />
          </div>
          <div>
            <label>Category</label>
            <select id="m-category">
              <option value="">— choose —</option>
              <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
              <option>Desserts</option><option>Snacks</option><option>Drinks</option>
              <option>Soups &amp; Stews</option><option>Salads</option><option>Baked Goods</option><option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div><label>Prep time</label><input type="text" id="m-prep" placeholder="20 min" /></div>
          <div><label>Cook time</label><input type="text" id="m-cook" placeholder="45 min" /></div>
        </div>
        <label>Image URL (optional)</label>
        <input type="url" id="m-img" placeholder="https://..." />
        <label>Ingredients (one per line)</label>
        <textarea id="m-ingredients" placeholder="2 cups flour&#10;1 tsp salt&#10;3 eggs..."></textarea>
        <label>Instructions (one step per line)</label>
        <textarea id="m-instructions" placeholder="Preheat oven to 375°F&#10;Mix dry ingredients..."></textarea>
        <label>Notes (tips, substitutions, memories...)</label>
        <textarea id="m-notes" placeholder="Mom always added a pinch of cinnamon&#10;Can substitute oat milk&#10;Best served warm!"></textarea>
        <button class="btn-primary" onclick="saveManual()">Save Recipe</button>
      </div>
    </div>
  </div>

  <!-- EDIT RECIPE MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeEditModal()">&#x2715;</button>
      <div class="modal-title">Edit Recipe</div>
      <input type="hidden" id="e-id" />
      <div class="form-row">
        <div><label>Recipe name</label><input type="text" id="e-title" /></div>
        <div>
          <label>Category</label>
          <select id="e-category">
            <option value="">— choose —</option>
            <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
            <option>Desserts</option><option>Snacks</option><option>Drinks</option>
            <option>Soups &amp; Stews</option><option>Salads</option><option>Baked Goods</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div><label>Prep time</label><input type="text" id="e-prep" placeholder="20 min" /></div>
        <div><label>Cook time</label><input type="text" id="e-cook" placeholder="45 min" /></div>
      </div>
      <label>Photo</label>
      <div style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1rem;">
        <label for="e-img-file" id="e-img-file-label" style="display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;background:var(--sage-mist);border:1.5px dashed var(--sage-light);border-radius:3px;padding:0.75rem;cursor:pointer;font-size:0.8rem;color:var(--sage-deep);letter-spacing:0.5px;text-transform:none;margin-bottom:0;transition:background 0.15s;">
          📷 Upload from camera roll
        </label>
        <input type="file" id="e-img-file" accept="image/*" style="display:none" onchange="handleEditFileChange(this)" />
        <div id="e-img-upload-name" style="font-size:0.75rem;color:var(--text-muted);font-style:italic;display:none;"></div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <div style="flex:1;height:1px;background:var(--border-light);"></div>
          <span style="font-size:0.7rem;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;">or paste a URL</span>
          <div style="flex:1;height:1px;background:var(--border-light);"></div>
        </div>
        <input type="url" id="e-img" placeholder="https://..." oninput="previewEditImg(this.value)" style="margin-bottom:0;" />
      </div>
      <div id="e-img-preview" style="display:none;margin-top:-0.5rem;margin-bottom:1rem;">
        <img id="e-img-thumb" src="" alt="preview" style="width:100%;height:140px;object-fit:cover;border-radius:3px;border:1px solid var(--border-light);">
      </div>
      <label>Ingredients (one per line)</label>
      <textarea id="e-ingredients"></textarea>
      <label>Instructions (one step per line)</label>
      <textarea id="e-instructions"></textarea>
      <label>Notes (tips, substitutions, memories...)</label>
      <textarea id="e-notes" placeholder="My thoughts, substitutions, memories..."></textarea>
      <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>

</div>
<script src="js/app.js"></script>
</body>
</html>
